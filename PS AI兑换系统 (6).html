<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:#121212;color:#fff;user-select:none}
.main{max-width:420px;margin:60px auto;padding:40px 30px;background:#1a1a1a;border-radius:20px;box-shadow:0 0 40px #00000099}
.title{font-size:26px;font-weight:bold;color:#ff4444;text-align:center;margin-bottom:30px}
.input-box{margin-bottom:20px}
input{width:100%;padding:16px;background:#2a2a2a;color:#fff;border:1px solid #444;border-radius:10px;font-size:16px;outline:none}
button{width:100%;padding:16px;background:#ff4444;color:#fff;border:none;border-radius:10px;font-size:17px;font-weight:bold;cursor:pointer}
.tip{margin-top:20px;text-align:center;color:#888;font-size:13px}
.time-bar{margin-top:20px;text-align:center;color:#ff4444;font-size:16px;font-weight:bold}
.hide{display:none}
.logout-btn{background:#555;margin-top:15px;font-size:15px;padding:12px}
</style>
</head>
<body oncontextmenu="return false">
<div id="loginBox" class="main">
<div class="title">PS AI兑换系统</div>
<div class="input-box">
<input type="text" id="code" placeholder="请输入授权码">
</div>
<button onclick="login()">立即登录</button>
<div class="tip">未授权禁止使用<br>客服微信：feiyu1765</div>
</div>
<div id="userPage" class="main hide">
<div class="title">PS AI账号兑换</div>
<div id="remainTime" class="time-bar"></div>
<div class="tip" style="margin-top:20px;margin-bottom:30px">点击进入兑换中心</div>
<button onclick="goPage()">进入兑换中心</button>
<button class="logout-btn" onclick="logout()">退出登录</button>
<div class="tip" style="margin-top:30px">客服微信：<span style="color:#ff4444;font-weight:bold">feiyu1765</span></div>
</div>
<script>
document.onkeydown=function(e){if(e.key=="F12")return false}
const localStorageKey = "user_auth_info";
const ALL_AUTH_CODES = [{"code":"4RUnbuzxHsIUzmCu","duration":1,"unit":"day"},{"code":"ZsW166J8cKNOI1XK","duration":30,"unit":"day"},{"code":"U6IkILhacc2Ay6bN","duration":1,"unit":"day"},{"code":"c87cnxeOekPf7Lmk","duration":1,"unit":"day"},{"code":"hANkXpY3AlaxEFPw","duration":1,"unit":"day"},{"code":"ntnZuwC19JncuHye","duration":1,"unit":"day"},{"code":"duc8WWARHvxM33zq","duration":1,"unit":"day"},{"code":"SxtUwx6EcImQvGxg","duration":1,"unit":"day"},{"code":"8VN74SBgUnNra6CJ","duration":1,"unit":"day"}];
function durationToMs(duration, unit) {
    if(unit === "day") return duration * 24 * 3600 * 1000;
    if(unit === "hour") return duration * 3600 * 1000;
    if(unit === "minute") return duration * 60 * 1000;
    return 0;
}
function getRemainText(expire){
let now = Date.now();
let left = expire - now;
if(left <= 0) return "授权已过期";
let d = Math.floor(left / (24*3600*1000));
let h = Math.floor((left % (24*3600*1000)) / (3600*1000));
let m = Math.floor((left % (3600*1000)) / (60*1000));
if(d > 0) return "剩余 " + d + " 天 " + h + " 小时";
if(h > 0) return "剩余 " + h + " 小时 " + m + " 分钟";
return "剩余 " + m + " 分钟";
}
function login(){
let c = document.getElementById("code").value.trim();
let now = Date.now();
let authItem = ALL_AUTH_CODES.find(function(x){return x.code===c;});
if(!authItem){alert("授权码无效");return;}
let localInfo = JSON.parse(localStorage.getItem(localStorageKey) || "{}");
if(!localInfo.expire || localInfo.code!==c){
    let expireMs = durationToMs(authItem.duration, authItem.unit);
    localInfo = {
        code: c,
        expire: now + expireMs
    };
    localStorage.setItem(localStorageKey, JSON.stringify(localInfo));
    alert("授权成功！有效期从现在开始计算");
}
if(localInfo.expire <= now){
    alert("授权码已过期");
    localStorage.removeItem(localStorageKey);
    return;
}
loginBox.classList.add("hide");
userPage.classList.remove("hide");
document.getElementById("remainTime").innerText = getRemainText(localInfo.expire);
}
function logout(){
if(confirm("确定退出登录吗？")){
localStorage.removeItem(localStorageKey);
userPage.classList.add("hide");
loginBox.classList.remove("hide");
document.getElementById("code").value = "";
}
}
function goPage(){
window.open("https://psai.pro/login","_blank","width=400,height=600");
}
window.onload = function(){
let info = localStorage.getItem(localStorageKey);
if(!info) return;
let {code, expire} = JSON.parse(info);
let now = Date.now();
if(expire > now){
loginBox.classList.add("hide");
userPage.classList.remove("hide");
document.getElementById("remainTime").innerText = getRemainText(expire);
} else {
localStorage.removeItem(localStorageKey);
}
};
</script>
</body>
</html>
